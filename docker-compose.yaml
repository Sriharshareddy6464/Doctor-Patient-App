services:
  db:
    image: postgres:16-alpine
    container_name: oshadhi_db
    restart: always
    environment:
      POSTGRES_DB: doctor_patient_app
      POSTGRES_USER: oshadhi_user
      POSTGRES_PASSWORD: oshadhi123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oshadhi_user -d doctor_patient_app"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oshadhi_backend
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://oshadhi_user:oshadhi123@db:5432/doctor_patient_app
      PORT: 5000
      FRONTEND_URL: http://localhost
    command: sh -c "npx prisma migrate deploy && node dist/server.js"
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: oshadhi_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
