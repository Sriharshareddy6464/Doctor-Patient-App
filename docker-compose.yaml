services:
  backend:
    image: ${BACKEND_IMAGE:-sriharshareddy6464/doc-backend:latest}
    container_name: oshadhi_backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: 5000
      FRONTEND_URL: ${FRONTEND_URL}
    command: sh -c "npx prisma migrate deploy && node dist/server.js"
    # backend port not exposed — only accessible via Nginx internally

  frontend:
    image: ${FRONTEND_IMAGE:-sriharshareddy6464/doc-frontend:latest}
    container_name: oshadhi_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"